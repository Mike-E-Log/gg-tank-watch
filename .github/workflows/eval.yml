name: eval

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Seed status.json (writer dogfood + schema-test fixture)
        # status.json is gitignored (runtime artifact). The schema tests need
        # a real snapshot to validate against, so produce one by running the
        # writer with sample facts. Also doubles as a smoke test that the
        # writer itself imports + runs end-to-end on a fresh checkout.
        # The seed must read as a RESOLVED snapshot the data-guards accept:
        # resolved/recovery headline + no midnight-UTC timestamps (which render
        # a day early in Pacific). See eval/test_info_disclosures.py and
        # eval/test_news_date_display.py.
        run: |
          echo '{"tank_temp_f":100,"tank_crack_observed":true,"evacuation_residents":50000,"evacuation_lifted":false,"evacuation_expanded":false,"evacuation_area_sq_mi":9,"evacuation_boundary_text":"CI sample","status_headline":"Resolved: evacuations lifted; cleanup underway","injuries":0,"official_statements":[{"agency":"CI","time_iso":"2026-05-25T12:00:00Z","text":"CI seed statement","source_url":"https://example.invalid/"}],"sources_checked":[{"url":"https://example.invalid/","title":"CI","fetched_iso":"2026-05-25T12:00:00Z"}],"schools_closed":["CI"]}' | python scripts/update_status.py

      - name: Run eval suite (skip integration; no internet contract in CI)
        run: |
          python eval/run_all.py --skip integration
        env:
          PYTHONUNBUFFERED: "1"

      - name: Upload scores.jsonl
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scores
          path: eval/scores.jsonl
          if-no-files-found: warn

  eval-integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run integration suite (Nominatim live)
        run: |
          python eval/run_all.py --only test_geocoder
