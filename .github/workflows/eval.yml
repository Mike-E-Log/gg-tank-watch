name: eval

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Writer smoke test (restore the committed frozen status.json after)
        # The committed status.json is now a FROZEN archive snapshot the data-guards
        # validate (no post-26th data, frozen timestamps, minimal headline). Still
        # smoke-test that the writer imports + runs end-to-end on a fresh checkout,
        # but RESTORE the frozen file afterward so the eval suite tests the archive,
        # not a freshly-written live snapshot.
        run: |
          cp public/status.json public/status.json.frozen
          echo '{"tank_temp_f":100,"tank_crack_observed":true,"evacuation_residents":50000,"evacuation_lifted":false,"evacuation_expanded":false,"evacuation_area_sq_mi":9,"evacuation_boundary_text":"CI sample","status_headline":"Resolved: evacuations lifted","injuries":0,"official_statements":[{"agency":"CI","time_iso":"2026-05-25T12:00:00Z","text":"CI seed statement","source_url":"https://example.invalid/"}],"sources_checked":[{"url":"https://example.invalid/","title":"CI","fetched_iso":"2026-05-25T12:00:00Z"}],"schools_closed":["CI"]}' | python scripts/update_status.py
          mv public/status.json.frozen public/status.json

      - name: Run eval suite (skip integration; no internet contract in CI)
        run: |
          python eval/run_all.py --skip integration
        env:
          PYTHONUNBUFFERED: "1"

      - name: Upload scores.jsonl
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scores
          path: eval/scores.jsonl
          if-no-files-found: warn

  eval-integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run integration suite (Nominatim live)
        run: |
          python eval/run_all.py --only test_geocoder
